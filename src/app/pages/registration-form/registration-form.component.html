<h2>User Registration</h2>
<form (ngSubmit)="onRegister()">
  <label>Username:
    <input [(ngModel)]="user.username" name="username" required appValidateInput [maxLength]="20" [allowSymbols]="false" />
  </label>
  <br/>
  <label>Email:
    <input [(ngModel)]="user.email" name="email" type="email" required appValidateInput [maxLength]="50" [allowSymbols]="true" />
  </label>
  <br/>
  <label>Password:
    <input [(ngModel)]="user.password" name="password" type="password" required appValidateInput [maxLength]="30" [allowSymbols]="true" />
  </label>
  <br/>
  <button type="submit">Register</button>
</form>
<div *ngIf="errorMessage" style="color:red">{{ errorMessage }}</div>
<div *ngIf="successMessage" style="color:green">{{ successMessage }}</div>
