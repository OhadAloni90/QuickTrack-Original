<h2>User Settings</h2>
<div *ngIf="error" class="error">
  {{ error }}
</div>

<div *ngIf="settings">
  <div class="container">
    <div class="theme">
      <p class="text text_4">Theme: {{ settings.settings.theme }}</p>
    </div>
    <button class="btn btn_toggle text text_4" (click)="toggleDarkMode()">
      Toggle Dark Mode
    </button>
    <p class="text text_4">Dark Mode is: {{ darkMode$ | async ? 'On' : 'Off' }}</p>
    <div class="notification">
      <p class="text text_4"> cNotifications: {{ settings.settings.notifications }}</p>
    </div>
    <div class="username">
      <p class="text text_4">Username: {{settings.username}}</p>
    </div>
    <div class="username">
      <p class="text text_4">Email: {{settings.email}}</p>
    </div>
  </div>
</div>
<div class="footer">
  <div class="actions">
    <button class="btn btn_action text text_4" [disabled]="!settings" [routerLink]="['edit']">     Edit Profile</button>
  </div>
</div>
<div *ngIf="!error && !settings">
  Loading...
</div>
