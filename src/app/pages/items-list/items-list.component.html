<h2>Items List</h2>
<div *ngIf="error" class="error">{{ error }}</div>

<div class="search-container" *ngIf="items && authService.currentUser?.role !== 'viewer'">
  <input class="input" [(ngModel)]="searchTerm">
</div>
<ul *ngIf="authService.currentUser?.role !== 'viewer'">
  <li *ngFor="let item of items">
    {{ item.name }} - {{ item.description }} -    {{item.price}}
  </li>
</ul>

<div *ngIf="!error && !items.length && authService.currentUser?.role !== 'viewer'">
  No items found.
</div>
