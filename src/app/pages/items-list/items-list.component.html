<h2>Items List</h2>
<div *ngIf="error" class="error">{{ error }}</div>

<div class="search-container" *ngIf="items">
  <input class="input" [formControl]="searchTerm">
</div>
<ul>
  <li *ngFor="let item of items">
    {{ item.name }} - {{ item.description }} -    {{item.price}}
  </li>
</ul>

<div *ngIf="!error && !items.length">
  No items found.
</div>
