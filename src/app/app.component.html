<h1>{{ title }}</h1>
<nav>
  <ng-container *ngIf="isLoggedIn; else loggedOut">
    <a href="#" (click)="logout()">Logout</a>
  </ng-container>
  <ng-template #loggedOut>
    <a routerLink="/register">Register</a>
    <a routerLink="/login">Login</a>
  </ng-template>
  <!-- Other navigation links -->
  <a routerLink="/users-settings">User Settings</a> |
  <a routerLink="/items-list">Items List</a> |
  <a routerLink="/add-item">Add Item</a> |
  <a routerLink="/products">View Products</a>
</nav>

<!-- The router-outlet is where page components get displayed -->
<router-outlet></router-outlet>
